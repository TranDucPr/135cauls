<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN Lịch sử mới - Ôn Tập</title>
    <style>
        /* CORE NATIVE CSS - CHẠY 100% OFFLINE */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --text-mut: #64748b; --border: #e2e8f0;
            --primary: #2563eb; --primary-hover: #1e40af;
            --success-bg: #ecfdf5; --success-border: #10b981; --success-text: #059669;
            --danger-bg: #fef2f2; --danger-border: #ef4444; --danger-text: #e11d48;
            --tf-t-hover: #ecfdf5; --tf-t-text: #059669; --tf-t-active: #10b981;
            --tf-f-hover: #fef2f2; --tf-f-text: #e11d48; --tf-f-active: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* Layouts */
        header { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        .header-inner { max-width: 800px; margin: 0 auto; padding: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .header-inner h1 { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-reset { background: #f1f5f9; color: var(--text-mut); border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: color 0.2s; white-space: nowrap; }
        .btn-reset:hover { color: var(--danger-border); }
        .btn-fs { background: transparent; border: none; font-size: 20px; cursor: pointer; color: var(--text-mut); padding: 4px 10px; border-radius: 8px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-fs:hover { background: #e2e8f0; color: var(--text); }
        .progress-bar { height: 6px; background: #f1f5f9; width: 100%; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }

        main { flex-grow: 1; width: 100%; max-width: 800px; margin: 0 auto; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        .stats { width: 100%; display: flex; justify-content: space-between; margin-bottom: 24px; font-size: 14px; font-weight: 600; color: var(--text-mut); align-items: center; }
        .badge-mastered { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; padding: 4px 12px; border-radius: 99px; }

        /* Questions */
        .quiz-card { width: 100%; background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .q-type { display: inline-block; background: #e0e7ff; color: #4338ca; font-size: 12px; font-weight: bold; padding: 6px 10px; border-radius: 6px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .q-content { font-size: 20px; font-weight: 600; line-height: 1.6; margin-bottom: 24px; white-space: pre-wrap; word-break: break-word; }
        .quiz-image { max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid var(--border); display: block; }

        /* Options Single */
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { width: 100%; text-align: left; padding: 16px; background: var(--card); border: 2px solid var(--border); border-radius: 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: all 0.2s; outline: none; }
        .opt-btn:hover:not(:disabled) { background: #eff6ff; border-color: #bfdbfe; }
        .opt-label { flex-shrink: 0; width: 32px; height: 32px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text-mut); margin-top: 2px; }
        .opt-text { font-size: 16px; font-weight: 500; line-height: 1.5; padding-top: 6px; white-space: pre-wrap; word-break: break-word; }

        /* Options TF */
        .tf-row { border: 2px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px; transition: all 0.2s; background: var(--card); }
        .tf-content { display: flex; align-items: flex-start; gap: 12px; flex-grow: 1; overflow: hidden; }
        .tf-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .tf-btn { padding: 10px 24px; border: 2px solid var(--border); background: transparent; border-radius: 10px; font-weight: 700; color: var(--text-mut); cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .tf-btn.t:hover:not(:disabled) { background: var(--tf-t-hover); border-color: #a7f3d0; color: var(--tf-t-text); }
        .tf-btn.f:hover:not(:disabled) { background: var(--tf-f-hover); border-color: #fecdd3; color: var(--tf-f-text); }
        .tf-btn.t.active { background: var(--tf-t-active); border-color: var(--tf-t-active); color: white; }
        .tf-btn.f.active { background: var(--tf-f-active); border-color: var(--tf-f-active); color: white; }

        /* General States */
        .focused-item { outline: 3px solid var(--primary) !important; transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 10; position: relative; }
        .opt-correct { background: var(--success-bg) !important; border-color: var(--success-border) !important; }
        .opt-correct .opt-label { background: var(--success-border) !important; color: white !important; }
        .opt-correct .opt-text { color: var(--success-text) !important; font-weight: 600; }
        .opt-wrong { background: var(--danger-bg) !important; border-color: var(--danger-border) !important; opacity: 0.9; }
        .opt-wrong .opt-label { background: var(--danger-border) !important; color: white !important; }
        .opt-wrong .opt-text { color: var(--danger-text) !important; text-decoration: line-through; }
        .opt-disabled, .tf-btn:disabled { opacity: 0.6; pointer-events: none; cursor: default; }

        /* Action Panel */
        .action-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 16px; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20; }
        .action-panel.show { transform: translateY(0); }
        .action-inner { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .feedback { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .fb-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .feedback.success { color: var(--success-text); }
        .feedback.success .fb-icon { background: #d1fae5; }
        .feedback.error { color: var(--danger-text); }
        .feedback.error .fb-icon { background: #fee2e2; }
        .btn-next { background: var(--text); color: white; border: none; padding: 14px 32px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-next:hover { background: #000; }
        .hidden { display: none !important; }

        /* Victory */
        .victory { width: 100%; text-align: center; padding: 48px 24px; background: var(--card); border-radius: 24px; border: 1px solid #a7f3d0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .victory-icon { font-size: 64px; margin-bottom: 16px; }
        .victory h2 { font-size: 24px; margin-bottom: 8px; color: var(--text); font-weight: 700; }
        .victory p { color: var(--text-mut); margin-bottom: 32px; font-size: 16px; }
        .btn-restart { background: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn-restart:hover { background: var(--primary-hover); }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .tf-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .tf-actions { width: 100%; }
            .tf-btn { flex: 1; padding: 12px; }
            .quiz-card { padding: 20px; border-radius: 16px; }
            .action-inner { flex-direction: column; text-align: center; }
            .btn-next { width: 100%; justify-content: center; }
        }
    </style>
    <script>
        // Random Colors Generator
        const palettes = [
            {p: '#2563eb', hover: '#1e40af', bg: '#eff6ff'}, // Blue
            {p: '#059669', hover: '#047857', bg: '#ecfdf5'}, // Emerald
            {p: '#7c3aed', hover: '#6d28d9', bg: '#f5f3ff'}, // Violet
            {p: '#db2777', hover: '#be185d', bg: '#fdf2f8'}, // Pink
            {p: '#ea580c', hover: '#c2410c', bg: '#fff7ed'}, // Orange
            {p: '#0d9488', hover: '#0f766e', bg: '#f0fdfa'}  // Teal
        ];
        const randPal = palettes[Math.floor(Math.random() * palettes.length)];
        document.documentElement.style.setProperty('--primary', randPal.p);
        document.documentElement.style.setProperty('--primary-hover', randPal.hover);
        document.documentElement.style.setProperty('--bg', randPal.bg);
    </script>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>TN Lịch sử mới</h1>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button onclick="toggleFS()" class="btn-fs" title="Toàn màn hình">⛶</button>
                <button onclick="resetData()" class="btn-reset">Làm lại từ đầu</button>
            </div>
        </div>
        <div class="progress-bar">
            <div id="progressBar" class="progress-fill"></div>
        </div>
    </header>

    <main>
        <div class="stats">
            <div>Câu <span id="currentIdxDisplay" style="color:var(--text)">0</span> / <span id="queueTotalDisplay">0</span></div>
            <div class="badge-mastered">Đã thuộc: <span id="masteredDisplay">0</span> / <span id="totalQuestionsDisplay">0</span></div>
        </div>

        <div id="quizContainer" class="fade-in"></div>

        <div id="victoryScreen" class="victory hidden">
            <div class="victory-icon">🏆</div>
            <h2>Hoàn thành xuất sắc!</h2>
            <p>Bạn đã ghi nhớ toàn bộ nội dung của bộ câu hỏi này.</p>
            <button onclick="resetData()" class="btn-restart">Học lại lần nữa</button>
        </div>
    </main>

    <div id="actionPanel" class="action-panel">
        <div class="action-inner">
            <div id="feedbackText" class="feedback"></div>
            <button id="nextBtn" onclick="goNext()" class="btn-next hidden">Tiếp tục (Chuột Phải / Enter) ➔</button>
        </div>
    </div>

        const STORAGE_KEY = 'AZOTA_MEM_' + "TN Lịch sử mới".replace(/[^a-zA-Z0-9]/g, '_');
        
        let state;
        try {
            state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { masteredIds: [], queueIds: [], currentIndex: 0 };
        } catch(err) {
            state = { masteredIds: [], queueIds: [], currentIndex: 0 };
        }
        
        let currentQuestion = null;
        let isAnswered = false;
        let currentTFAnswers = {}; 
        let currentHasFailed = false;

        let focusables = [];
        let focusIndex = -1;

        function saveState() { 
             try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
             catch(err) {}
        }

        function initApp() {
            if (QUESTIONS.length === 0) return;
            document.getElementById('totalQuestionsDisplay').innerText = QUESTIONS.length;
            
            if (state.queueIds.length === 0 || state.currentIndex >= state.queueIds.length) {
                let unmastered = QUESTIONS.filter(q => !state.masteredIds.includes(q.id));
                if (unmastered.length === 0) {
                    showVictory();
                    return;
                }
                state.queueIds = unmastered.map(q => q.id).sort(() => Math.random() - 0.5);
                state.currentIndex = 0;
                saveState();
            }
            render();
        }

        function render() {
            isAnswered = false;
            currentHasFailed = false;
            currentTFAnswers = {};
            
            document.getElementById('actionPanel').classList.remove('show');
            document.getElementById('nextBtn').classList.add('hidden');
            
            const qId = state.queueIds[state.currentIndex];
            currentQuestion = QUESTIONS.find(q => q.id === qId);

            document.getElementById('currentIdxDisplay').innerText = state.currentIndex + 1;
            document.getElementById('queueTotalDisplay').innerText = state.queueIds.length;
            document.getElementById('masteredDisplay').innerText = state.masteredIds.length;
            document.getElementById('progressBar').style.width = ((state.currentIndex / state.queueIds.length) * 100) + '%';

            const container = document.getElementById('quizContainer');
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');

            let optionsHtml = '';

            if (currentQuestion.type === 'tf') {
                optionsHtml += '<div class="options-list">';
                currentQuestion.options.forEach((opt, idx) => {
                    optionsHtml += `
                        <div class="tf-row" id="opt-row-${idx}">
                            <div class="tf-content">
                                <span class="opt-label">${opt.label})</span>
                                <span class="opt-text">${opt.text}</span>
                            </div>
                            <div class="tf-actions">
                                <button onclick="handleTFSelect(${idx}, true)" id="btn-t-${idx}" class="tf-btn t">ĐÚNG</button>
                                <button onclick="handleTFSelect(${idx}, false)" id="btn-f-${idx}" class="tf-btn f">SAI</button>
                            </div>
                        </div>
                    `;
                });
                optionsHtml += '</div>';
            } else {
                optionsHtml += '<div class="options-list">';
                currentQuestion.options.forEach((opt, idx) => {
                    optionsHtml += `
                        <button onclick="handleSelect(${idx})" id="opt-${idx}" class="opt-btn">
                            <span class="opt-label">${opt.label}.</span>
                            <span class="opt-text">${opt.text}</span>
                        </button>
                    `;
                });
                optionsHtml += '</div>';
            }

            container.innerHTML = `
                <div class="quiz-card">
                    ${currentQuestion.type === 'tf' ? '<span class="q-type">TRẮC NGHIỆM ĐÚNG / SAI</span>' : ''}
                    <div class="q-content">${currentQuestion.contentHTML}</div>
                    ${optionsHtml}
                </div>
            `;
            
            setTimeout(updateFocusables, 50);
        }

        function handleSelect(idx) {
            if (isAnswered) return;
            const isCorrect = (idx === currentQuestion.correctIndex);
            const btn = document.getElementById('opt-' + idx);
            
            if (isCorrect) {
                isAnswered = true;
                btn.classList.add('opt-correct', 'opt-disabled');
                
                for (let i = 0; i < currentQuestion.options.length; i++) {
                    if (i !== idx) document.getElementById('opt-' + i).classList.add('opt-disabled');
                }
                
                showFeedback(true, !currentHasFailed);
            } else {
                currentHasFailed = true;
                btn.classList.add('opt-wrong', 'opt-disabled');
                showFeedback(false);
            }
            updateFocusables();
        }

        function handleTFSelect(optIdx, isTrueSelection) {
            if (isAnswered) return;
            currentTFAnswers[optIdx] = isTrueSelection;
            
            const btnT = document.getElementById(`btn-t-${optIdx}`);
            const btnF = document.getElementById(`btn-f-${optIdx}`);
            const row = document.getElementById(`opt-row-${optIdx}`);
            
            row.classList.remove('opt-wrong');
            btnT.className = "tf-btn t";
            btnF.className = "tf-btn f";
            
            if (isTrueSelection) btnT.classList.add('active');
            else btnF.classList.add('active');

            if (Object.keys(currentTFAnswers).length === currentQuestion.options.length) checkTFAnswer();
        }

        function checkTFAnswer() {
            let allCorrect = true;

            currentQuestion.options.forEach((opt, idx) => {
                if (currentTFAnswers[idx] !== opt.isTrue) allCorrect = false;
            });

            if (allCorrect) {
                isAnswered = true;
                currentQuestion.options.forEach((opt, idx) => {
                    const row = document.getElementById(`opt-row-${idx}`);
                    const btnT = document.getElementById(`btn-t-${idx}`);
                    const btnF = document.getElementById(`btn-f-${idx}`);
                    
                    btnT.disabled = true; btnF.disabled = true;
                    row.classList.add('opt-correct');
                });
                showFeedback(true, !currentHasFailed);
            } else {
                currentHasFailed = true;
                
                currentQuestion.options.forEach((opt, idx) => {
                    const userChoice = currentTFAnswers[idx];
                    const isCorrectChoice = (userChoice === opt.isTrue);
                    const row = document.getElementById(`opt-row-${idx}`);
                    const btnT = document.getElementById(`btn-t-${idx}`);
                    const btnF = document.getElementById(`btn-f-${idx}`);

                    if (!isCorrectChoice) {
                        row.classList.add('opt-wrong');
                        delete currentTFAnswers[idx];
                        btnT.className = "tf-btn t";
                        btnF.className = "tf-btn f";
                    } else {
                        btnT.disabled = true; btnF.disabled = true;
                        row.classList.add('opt-correct');
                    }
                });
                showFeedback(false);
            }
            updateFocusables();
        }

        function showFeedback(isCorrectFinal, isPerfect = false) {
            const feedback = document.getElementById('feedbackText');
            const nextBtn = document.getElementById('nextBtn');
            
            if (isCorrectFinal) {
                if (isPerfect && !state.masteredIds.includes(currentQuestion.id)) {
                    state.masteredIds.push(currentQuestion.id);
                }
                
                feedback.className = 'feedback success';
                feedback.innerHTML = '<div class="fb-icon">✓</div> <span>Tuyệt vời, Đúng rồi!</span>';
                
                document.getElementById('masteredDisplay').innerText = state.masteredIds.length;
                saveState();
                
                nextBtn.classList.remove('hidden');
                document.getElementById('actionPanel').classList.add('show');
                nextBtn.focus();
            } else {
                feedback.className = 'feedback error';
                feedback.innerHTML = '<div class="fb-icon">✗</div> <span>Sai rồi, Hãy chọn lại nhé!</span>';
                
                nextBtn.classList.add('hidden');
                document.getElementById('actionPanel').classList.add('show');
            }
        }

        function goNext() {
            if (!isAnswered) return;
            state.currentIndex++;
            saveState();
            initApp();
        }

        function resetData() {
            if(confirm('Xóa bộ nhớ và bắt đầu lại từ đầu?')) {
                state = { masteredIds: [], queueIds: [], currentIndex: 0 };
                saveState();
                document.getElementById('victoryScreen').classList.add('hidden');
                document.getElementById('quizContainer').classList.remove('hidden');
                initApp();
            }
        }

        function showVictory() {
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('victoryScreen').classList.remove('hidden');
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('masteredDisplay').innerText = QUESTIONS.length;
            document.getElementById('actionPanel').classList.remove('show');
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function updateFocusables() {
            focusables = Array.from(document.querySelectorAll('.opt-btn:not(.opt-disabled), .tf-btn:not(:disabled)'));
            focusIndex = focusables.length > 0 ? 0 : -1;
            drawFocus();
        }

        function drawFocus() {
            document.querySelectorAll('.focused-item').forEach(el => el.classList.remove('focused-item'));
            if (focusIndex >= 0 && focusIndex < focusables.length) {
                focusables[focusIndex].classList.add('focused-item');
            }
        }

        // Tắt menu chuột phải mặc định của trình duyệt
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Lắng nghe thao tác chuột
        document.addEventListener('mousedown', e => {
            // Nếu người dùng nhấn chuột trực tiếp vào nút, cứ để nút hoạt động bình thường
            if (e.target.closest('button')) return; 

            if (e.button === 0) { // Chuột trái -> Điều hướng focus
                if (isAnswered) return; 
                if (focusables.length > 0) {
                    focusIndex = (focusIndex + 1) % focusables.length;
                    drawFocus();
                }
            } else if (e.button === 2) { // Chuột phải -> Chọn hoặc Next
                if (isAnswered) {
                    const nextBtn = document.getElementById('nextBtn');
                    if (!nextBtn.classList.contains('hidden')) goNext();
                } else {
                    if (focusIndex >= 0 && focusIndex < focusables.length) {
                        focusables[focusIndex].click();
                    }
                }
            }
        });

        document.addEventListener('keydown', e => { if(e.key === 'Enter' && isAnswered) goNext(); });

        initApp();
    </script>
</body>
</html>
